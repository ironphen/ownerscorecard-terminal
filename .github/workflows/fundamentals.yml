# Refreshes src/data/fundamentals.json from SEC EDGAR.
#
# Manual-trigger only for now (workflow_dispatch) — it does nothing until you
# run it from the Actions tab. When you're ready for it to refresh on its own,
# uncomment the schedule block. Set an Actions variable SEC_USER_AGENT with a
# descriptive contact string (SEC requests one); falls back to a default.
name: Fundamentals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — self-refresh, no manual upkeep

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fetch:fundamentals
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - run: npm run fetch:filings
        continue-on-error: true # qualitative layer; never fail the fundamentals refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - run: npm run fetch:prices
        continue-on-error: true # price layer; no-ops with no key, never fails the build
        env:
          PRICE_PROVIDER: ${{ vars.PRICE_PROVIDER }}   # optional; defaults to polygon
          PRICE_API_KEY: ${{ secrets.PRICE_API_KEY }}  # add this secret to light up valuation
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- src/data/fundamentals.json src/data/language.json src/data/prices.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/fundamentals.json src/data/language.json src/data/prices.json
            git commit -m "Refresh fundamentals, filing language, prices"
            git push
          else
            echo "No change."
          fi
