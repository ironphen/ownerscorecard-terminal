# Refreshes the deep data (fundamentals.json + language.json + segments.json) from
# SEC EDGAR and commits any change, which redeploys the site. Self-maintaining on two
# schedules, no manual upkeep: fundamentals (the quarterly-changing figures) refresh
# weekly on Mondays, while the heavier filing-language and segment fetches plus a fresh
# Nasdaq universe rebuild run monthly on the 1st — so new names enter on their own and
# the weekly run stays light. Either can be kicked by hand from the Actions tab. The
# lighter Filing Wire (wire.yml) refreshes daily.
# Set an Actions variable SEC_USER_AGENT with a contact string (SEC requests one).
name: Fundamentals

on:
  workflow_dispatch:
    inputs:
      segments_only:
        description: "Run only the segment fetch (skip fundamentals/filings)"
        type: boolean
        default: false
      filings_only:
        description: "Run only the filing-language fetch (skip fundamentals/segments)"
        type: boolean
        default: false
      fundamentals_only:
        description: "Run only the fundamentals fetch (skip filings/segments) — the light refresh"
        type: boolean
        default: false
      fetch_adr:
        description: "Also fetch the ADR pool (IFRS/US-GAAP 20-F fundamentals). Needs universe.adr.json; pair with rebuild_universe=write to bootstrap it."
        type: boolean
        default: false
      tickers:
        description: "Limit the segment AND fundamentals fetch to these tickers (comma-separated; blank = all). The rest carry over from the last good file."
        type: string
        default: ""
      debug:
        description: "Dump raw XBRL axes for these tickers (comma-separated; diagnostic only)"
        type: string
        default: ""
      rebuild_universe:
        description: "Rebuild the US universe from the Nasdaq screener, top names by market cap (dryrun = test the source only; write = rebuild then refetch all)"
        type: choice
        options:
          - "off"
          - "dryrun"
          - "write"
        default: "off"
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — weekly: fundamentals only (quarterly-changing figures)
    - cron: "0 8 1 * *" # 1st 08:00 UTC — monthly: rebuild universe + fundamentals + filings + segments

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Rebuild the US universe from the Nasdaq screener (top names by market cap): every month
      # on the schedule, and on demand. dryrun fetches and reports only (the fetch step below is
      # skipped); write/monthly overwrites universe.json, which the fetch then reads. A failed or
      # implausible fetch leaves the existing universe untouched, so it can never corrupt the input.
      - name: Rebuild universe
        if: ${{ github.event.inputs.rebuild_universe == 'dryrun' || github.event.inputs.rebuild_universe == 'write' || github.event.schedule == '0 8 1 * *' }}
        run: node scripts/buildUniverse.mjs
        env:
          UNIVERSE_DRYRUN: ${{ github.event.inputs.rebuild_universe == 'dryrun' && '1' || '' }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - run: npm run fetch:fundamentals
        if: ${{ github.event.inputs.segments_only != 'true' && github.event.inputs.filings_only != 'true' && github.event.inputs.rebuild_universe != 'dryrun' }}
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          DEBT_DEBUG: ${{ github.event.inputs.debug }}
          REVENUE_DEBUG: ${{ github.event.inputs.debug }}
          DEP_DEBUG: ${{ github.event.inputs.debug }}
          SHARES_DEBUG: ${{ github.event.inputs.debug }}
          CFO_DEBUG: ${{ github.event.inputs.debug }}
          CAPEX_DEBUG: ${{ github.event.inputs.debug }}
          ONLY_FUND: ${{ github.event.inputs.tickers }}
      # Filing language and segments only change when a company files a new annual report, so the
      # weekly Monday cron skips them; they refresh on the monthly cron and on demand.
      - run: npm run fetch:filings
        if: ${{ github.event.inputs.segments_only != 'true' && github.event.inputs.fundamentals_only != 'true' && github.event.schedule != '0 7 * * 1' }}
        continue-on-error: true # qualitative layer; never fail the fundamentals refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          BIZ_DEBUG: ${{ github.event.inputs.debug }}
      - run: npm run fetch:segments
        if: ${{ github.event.inputs.filings_only != 'true' && github.event.inputs.fundamentals_only != 'true' && github.event.schedule != '0 7 * * 1' }}
        continue-on-error: true # where-the-money-comes-from layer; never fail the refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          ONLY_TICKERS: ${{ github.event.inputs.tickers }}
          SEG_DEBUG: ${{ github.event.inputs.debug }}
      # The ADR pool (foreign 20-F filers, IFRS or US-GAAP). Annual filings, so it refreshes on the
      # monthly cron and on demand; reads universe.adr.json, which the rebuild step above writes (pair
      # fetch_adr with rebuild_universe=write to bootstrap). Non-fatal: a separate pool never blocks
      # the US refresh.
      - run: npm run fetch:fundamentals:adr
        if: ${{ (github.event.inputs.fetch_adr == 'true' || github.event.schedule == '0 8 1 * *') && github.event.inputs.debug == '' }}
        continue-on-error: true
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          ONLY_ADR: ${{ github.event.inputs.tickers }}
      # Data-quality gate: runs the same lib functions the pages do. A systemic coverage
      # cliff (a taxonomy change that drops a whole data layer) fails this step and blocks
      # the commit below, so a broadly-broken refresh is never shipped. Per-company issues
      # print loudly for review but do not block, so one odd filer can't freeze the weekly
      # run. Runs before the commit on purpose.
      - name: Audit data quality
        if: ${{ github.event.inputs.debug == '' }}
        run: npm run audit
      - name: Commit if changed
        if: ${{ github.event.inputs.debug == '' }}
        run: |
          # Stage every data file, the ADR pair guarded since it may not exist yet, then commit only
          # if anything actually staged — so a new ADR file is captured and a no-op run stays quiet.
          git add src/data/fundamentals.json src/data/language.json src/data/segments.json src/data/universe.json
          git add src/data/universe.adr.json src/data/fundamentals.adr.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Refresh fundamentals + filing language + segments"
            # Rebase-and-retry so a concurrent push can't silently drop the data refresh.
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected; rebasing on origin/$GITHUB_REF_NAME and retrying ($i)…"
              git pull --rebase origin "$GITHUB_REF_NAME" || { git rebase --abort; true; }
              sleep $((i * 3))
            done
          else
            echo "No change."
          fi
