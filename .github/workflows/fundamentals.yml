# Refreshes the deep data (fundamentals.json + language.json) from SEC EDGAR and
# commits any change, which redeploys the site. Runs on its own every Monday — no
# manual upkeep — and can be kicked by hand from the Actions tab. The lighter
# Filing Wire (wire.yml) refreshes daily; this heavier quarterly-grade data weekly.
# Set an Actions variable SEC_USER_AGENT with a contact string (SEC requests one).
name: Fundamentals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — self-refresh, no manual upkeep

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fetch:fundamentals
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - run: npm run fetch:filings
        continue-on-error: true # qualitative layer; never fail the fundamentals refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- src/data/fundamentals.json src/data/language.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/fundamentals.json src/data/language.json
            git commit -m "Refresh fundamentals + filing language"
            git push
          else
            echo "No change."
          fi
