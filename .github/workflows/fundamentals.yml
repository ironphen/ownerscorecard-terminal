# Refreshes the deep data (fundamentals.json + language.json + segments.json) from
# SEC EDGAR and commits any change, which redeploys the site. Runs on its own every
# Monday — no manual upkeep — and can be kicked by hand from the Actions tab. The
# lighter Filing Wire (wire.yml) refreshes daily; this heavier data weekly.
# Set an Actions variable SEC_USER_AGENT with a contact string (SEC requests one).
name: Fundamentals

on:
  workflow_dispatch:
    inputs:
      segments_only:
        description: "Run only the segment fetch (skip fundamentals/filings)"
        type: boolean
        default: false
      filings_only:
        description: "Run only the filing-language fetch (skip fundamentals/segments)"
        type: boolean
        default: false
      tickers:
        description: "Limit the segment fetch to these tickers (comma-separated; blank = all)"
        type: string
        default: ""
      debug:
        description: "Dump raw XBRL axes for these tickers (comma-separated; diagnostic only)"
        type: string
        default: ""
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC — self-refresh, no manual upkeep

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fetch:fundamentals
        if: ${{ github.event.inputs.segments_only != 'true' && github.event.inputs.filings_only != 'true' }}
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          DEBT_DEBUG: ${{ github.event.inputs.debug }}
          REVENUE_DEBUG: ${{ github.event.inputs.debug }}
      - run: npm run fetch:filings
        if: ${{ github.event.inputs.segments_only != 'true' }}
        continue-on-error: true # qualitative layer; never fail the fundamentals refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          BIZ_DEBUG: ${{ github.event.inputs.debug }}
      - run: npm run fetch:segments
        if: ${{ github.event.inputs.filings_only != 'true' }}
        continue-on-error: true # where-the-money-comes-from layer; never fail the refresh
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          ONLY_TICKERS: ${{ github.event.inputs.tickers }}
          SEG_DEBUG: ${{ github.event.inputs.debug }}
      # Data-quality gate: runs the same lib functions the pages do. A systemic coverage
      # cliff (a taxonomy change that drops a whole data layer) fails this step and blocks
      # the commit below, so a broadly-broken refresh is never shipped. Per-company issues
      # print loudly for review but do not block, so one odd filer can't freeze the weekly
      # run. Runs before the commit on purpose.
      - name: Audit data quality
        run: npm run audit
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- src/data/fundamentals.json src/data/language.json src/data/segments.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/fundamentals.json src/data/language.json src/data/segments.json
            git commit -m "Refresh fundamentals + filing language + segments"
            # Rebase-and-retry so a concurrent push can't silently drop the data refresh.
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected; rebasing on origin/$GITHUB_REF_NAME and retrying ($i)…"
              git pull --rebase origin "$GITHUB_REF_NAME" || { git rebase --abort; true; }
              sleep $((i * 3))
            done
          else
            echo "No change."
          fi
