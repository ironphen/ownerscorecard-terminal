# Diagnostics only — runs a chosen probe in CI (which can reach SEC) and prints the verdict to the job
# log. Writes NOTHING and commits NOTHING. Run a probe before building the corresponding extractor, so
# the build is decided by ground truth, not a guess. Kick it from the Actions tab.
#   probe=dividends → where the ADR pipeline's missing dividends actually live (tag vs dimensioned-only)
#   probe=segments  → how much ADR segment data is extractable, and the IFRS axis names to target
# Set an Actions variable SEC_USER_AGENT with a contact string (SEC requests one).
name: Probes (diagnostics)

on:
  workflow_dispatch:
    inputs:
      probe:
        description: "Which diagnostic to run"
        type: choice
        options:
          - dividends
          - segments
        default: dividends
      tickers:
        description: "Override the probe's sample (comma-separated tickers; blank = curated default)"
        type: string
        default: ""
      skip_filing:
        description: "Dividends probe only: companyfacts-only, skip the per-filing XBRL fetch (faster)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Prove each probe's pure parsing/verdict logic first (synthetic, no network), then run live.
      - name: Probe ADR dividends (live)
        if: ${{ github.event.inputs.probe == 'dividends' }}
        run: node scripts/probeAdrDividendsTest.mjs && npm run probe:adr-dividends
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          PROBE_TICKERS: ${{ github.event.inputs.tickers }}
          PROBE_SKIP_FILING: ${{ github.event.inputs.skip_filing == 'true' && '1' || '' }}
      - name: Probe ADR segments (live)
        if: ${{ github.event.inputs.probe == 'segments' }}
        run: npm run probe:segments
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
          ONLY_ADR: ${{ github.event.inputs.tickers }}
