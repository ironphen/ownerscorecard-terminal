# Refreshes the Japanese equities pool (fundamentals.jp.json) from EDINET, Japan's
# disclosure system, and commits any change. Separate from the US Fundamentals workflow
# so the two pools never block each other. Needs a free EDINET API v2 key in the
# EDINET_API_KEY repository secret. Runs weekly and on demand, and on a push that touches
# the JP pipeline (so a pipeline change refreshes the data straight away).
name: Fundamentals (Japan)

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Dump parsed EDINET elements for these tickers (comma-separated)"
        type: string
        default: ""
      lookback:
        description: "Days of EDINET document index to crawl (first run needs the full window)"
        type: string
        default: "430"
  push:
    branches: [claude/jolly-ride-nae81r]
    paths:
      - "scripts/fetchEdinetFundamentals.mjs"
      - "src/data/universe.jp.json"
      - ".github/workflows/fundamentals-jp.yml"
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC, an hour after the US refresh

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Parser self-test
        run: node scripts/edinetTest.mjs
      - name: Fetch Japanese fundamentals
        run: npm run fetch:fundamentals:jp
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_DEBUG: ${{ github.event.inputs.debug }}
          EDINET_LOOKBACK_DAYS: ${{ github.event.inputs.lookback }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- src/data/fundamentals.jp.json src/data/edinet-index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/fundamentals.jp.json src/data/edinet-index.json
            git commit -m "Refresh Japanese fundamentals (EDINET)"
            # Rebase-and-retry so a concurrent push can't silently drop the refresh.
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected; rebasing on origin/$GITHUB_REF_NAME and retrying ($i)…"
              git pull --rebase origin "$GITHUB_REF_NAME" || { git rebase --abort; true; }
              sleep $((i * 3))
            done
          else
            echo "No change."
          fi
