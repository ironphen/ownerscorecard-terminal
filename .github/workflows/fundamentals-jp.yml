# Refreshes the Japanese equities pool (fundamentals.jp.json) from EDINET, Japan's
# disclosure system, and commits any change. Separate from the US Fundamentals workflow
# so the two pools never block each other. Needs a free EDINET API v2 key in the
# EDINET_API_KEY repository secret. Runs weekly and on demand, and on a push that touches
# the JP pipeline (so a pipeline change refreshes the data straight away).
name: Fundamentals (Japan)

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Dump parsed EDINET elements for these tickers (comma-separated)"
        type: string
        default: ""
      tickers:
        description: "Limit the run to these tickers (comma-separated; blank = all). The rest carry over."
        type: string
        default: ""
      probe_segments:
        description: "Diagnostic: probe JP segment extractability instead of the fetch (writes nothing)"
        type: boolean
        default: false
      lookback:
        description: "Days of EDINET document index to crawl (~2300 reaches the ~10-year history; cached after the first run)"
        type: string
        default: "2300"
  push:
    branches: [main]
    paths:
      - "scripts/fetchEdinetFundamentals.mjs"
      - "src/data/universe.jp.json"
      - ".github/workflows/fundamentals-jp.yml"
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC, an hour after the US refresh

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Parser self-test
        run: node scripts/edinetTest.mjs
      # Diagnostic: measure JP segment extractability and print to the log; writes/commits nothing. When
      # set, the fetch/audit/commit steps below are skipped so it's a pure probe.
      - name: Probe JP segments (live)
        if: ${{ github.event.inputs.probe_segments == 'true' }}
        run: npm run probe:segments:jp
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          ONLY_JP: ${{ github.event.inputs.tickers }}
      - name: Fetch Japanese fundamentals
        if: ${{ github.event.inputs.probe_segments != 'true' }}
        run: npm run fetch:fundamentals:jp
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_DEBUG: ${{ github.event.inputs.debug }}
          EDINET_LOOKBACK_DAYS: ${{ github.event.inputs.lookback }}
          ONLY_JP: ${{ github.event.inputs.tickers }}
      - name: Audit JP data quality
        if: ${{ github.event.inputs.probe_segments != 'true' }}
        run: npm run audit:jp
      # Ingestion guardrail (adds the depreciation and through-cycle owner-earnings checks the JP gate
      # above doesn't cover). A coverage cliff blocks the commit; Japan's ~5-year EDINET record is held
      # to its own realistic floor, not the SEC pools' deeper one.
      - name: Audit coverage
        if: ${{ github.event.inputs.probe_segments != 'true' }}
        run: npm run audit:coverage
      - name: Commit if changed
        if: ${{ github.event.inputs.probe_segments != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, then check the index: git diff alone ignores untracked files, so a
          # brand-new fundamentals.jp.json (the first run) would otherwise read as no change.
          git add src/data/fundamentals.jp.json src/data/edinet-index.json
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "Refresh Japanese fundamentals (EDINET)"
            # Rebase-and-retry so a concurrent push can't silently drop the refresh.
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected; rebasing on origin/$GITHUB_REF_NAME and retrying ($i)…"
              git pull --rebase origin "$GITHUB_REF_NAME" || { git rebase --abort; true; }
              sleep $((i * 3))
            done
          fi
