# The Filing Wire — refreshes src/data/wire.json from SEC EDGAR submissions feeds.
# Lightweight (just the recent-filings lists), so it runs daily on its own, keeping
# the site current without the heavier fundamentals/filings refresh.
name: Filing Wire

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 1-5" # weekdays 11:00 UTC, after most filings post

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run fetch:wire
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      # The 10-year Treasury yield, the risk-free anchor the valuation's Graham bond test prefills.
      # Public-domain government data (FRED/Treasury), fetched here so the default stays current; it
      # fails soft, so a yield-fetch hiccup never blocks the wire commit.
      - run: npm run fetch:rates
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- src/data/wire.json src/data/rates.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/wire.json src/data/rates.json
            git commit -m "Refresh the filing wire and the risk-free rate"
            # Rebase-and-retry so a concurrent push (an overlapping fundamentals run) can't silently
            # drop the day's wire + risk-free-rate refresh, the way a bare push otherwise would.
            for i in 1 2 3 4 5; do
              git push && break
              echo "push rejected; rebasing on origin/$GITHUB_REF_NAME and retrying ($i)…"
              git pull --rebase origin "$GITHUB_REF_NAME" || { git rebase --abort; true; }
              sleep $((i * 3))
            done
          else
            echo "No change."
          fi
